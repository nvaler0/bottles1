<style>
  :root{
    --machine-1:#232c33;
    --machine-2:#161c20;
    --paper:#EDEAE0;
    --paper-dim:#E3DFD2;
    --ink:#1c1b18;
    --ink-soft:#726d5f;
    --ink-faint:#a29c8b;
    --line:#c7c2b4;
    --blue:#0056a4;
    --blue-soft:#dbe7f3;
    --green:#1f6b45;
    --green-soft:#dcece2;
    --stamp-red:#8a2e2e;
    --font-stamp:'Special Elite','Courier New',monospace;
    --font-mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse 600px 300px at 50% -10%, rgba(255,255,255,0.06), transparent 65%),
      repeating-linear-gradient(125deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 7px),
      linear-gradient(180deg, var(--machine-1), var(--machine-2));
    font-family:var(--font-mono);
    color:var(--ink);
    padding:36px 14px 64px;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
  .wrap{width:100%; max-width:440px;}
  .receipt{

      linear-gradient(45deg, transparent 50%, var(--paper) 50%) 0 0/16px 16px repeat-x,

  .masthead{text-align:center; padding-bottom:10px;}

    font-family:var(--font-stamp); font-size:20px; letter-spacing:2px; color:var(--ink);

  .masthead .sub{font-size:11px; color:var(--ink-soft); margin-top:4px; letter-spacing:0.5px;}
  .masthead .proj-name{font-weight:700; color:var(--blue);}

  .dotted{border:none; border-top:2px dotted var(--line); margin:14px 0;}

  .hero{text-align:center; margin:6px 0 10px;}
  .hero .num{font-size:40px; font-weight:800; line-height:1; letter-spacing:-1px;}
  .hero .num small{font-size:20px; font-weight:600; color:var(--ink-soft);}
  .hero .cap{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px;}

  .bar-track{position:relative; height:24px; background:var(--paper-dim); border:1px solid var(--line); overflow:hidden;}
  .bar-base,.bar-fill{
    position:absolute; inset:0;
    background-image:repeating-linear-gradient(90deg,
      currentColor 0 2px, transparent 2px 5px,
      currentColor 5px 6px, transparent 6px 9px,
      currentColor 9px 13px, transparent 13px 15px);
    background-size:15px 100%;
  }
  .bar-base{color:var(--line);}
  .bar-fill{color:var(--blue); overflow:hidden; transition:width .4s ease;}
  .bar-note{display:flex; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-top:6px;}

  .block-title{font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-soft); margin-bottom:6px; display:flex; justify-content:space-between;}

  .stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0 4px;}
  .stat{padding:8px 0;}
  .stat .lbl{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-soft);}
  .stat .val{font-size:17px; font-weight:700; margin-top:2px;}
  .stat .val.blue{color:var(--blue);}
  .stat .val.green{color:var(--green);}

  .section-label{font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-soft); margin:4px 0 8px;}

  .chip-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .chip{
    font-family:var(--font-mono); font-size:11px; padding:5px 9px; border:1px solid var(--blue);
    color:var(--blue); background:transparent; border-radius:2px; cursor:pointer;
  }
  .chip:hover{background:var(--blue-soft);}

  .quick-row{display:flex; gap:6px; margin-bottom:10px;}
  .btn-quick{
    flex:1; font-family:var(--font-mono); font-weight:700; font-size:13px; padding:9px 0;
    background:var(--ink); color:var(--paper); border:none; cursor:pointer; letter-spacing:0.5px;
  }
  .btn-quick:hover{opacity:0.85;}
  .btn-quick:focus-visible, .chip:focus-visible, .btn-primary:focus-visible, .btn-ghost:focus-visible, .tab-btn:focus-visible{
    outline:2px solid var(--blue); outline-offset:2px;
  }

  .custom-row{display:flex; gap:6px; margin-bottom:8px;}
  .custom-row input[type=number]{width:96px;}
  .custom-row input[type=text]{flex:1;}
  input[type=number], input[type=text]{
    font-family:var(--font-mono); font-size:13px; padding:8px 9px; border:1px solid var(--line);
    background:#fff; color:var(--ink);
  }
  input::placeholder{color:var(--ink-faint);}

  .btn-primary{
    width:100%; font-family:var(--font-mono); font-weight:700; font-size:13px; letter-spacing:1px;
    text-transform:uppercase; padding:11px 0; background:var(--blue); color:#fff; border:none; cursor:pointer;
  }
  .btn-primary:hover{background:#004689;}
  .btn-ghost{
    background:none; border:none; font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);
    text-decoration:underline; cursor:pointer; padding:6px 0;
  }

  .log-list{margin-top:4px;}
  .log-row{
    display:flex; align-items:center; gap:8px; font-size:12px; padding:6px 0; border-bottom:1px dotted var(--line);
  }
  .log-date{color:var(--ink-faint); width:40px; flex-shrink:0;}
  .log-desc{flex:1; min-width:0; overflow-wrap:anywhere;}
  .log-amt{color:var(--ink-soft); flex-shrink:0;}
  .log-stamp{cursor:pointer; font-family:var(--font-stamp);}
  .log-stamp .stamp-icon{width:16px; text-align:center; color:var(--stamp-red); flex-shrink:0;}
  .log-stamp.is-redeemed .stamp-icon{color:var(--green);}
  .log-stamp .log-desc{color:var(--stamp-red); letter-spacing:0.5px;}
  .log-stamp.is-redeemed .log-desc{color:var(--green);}
  .log-empty{font-size:12px; color:var(--ink-faint); padding:10px 0; text-align:center;}

  .complete-banner{text-align:center; margin:8px 0 16px;}
  .complete-banner .stamp{
    font-family:var(--font-stamp); font-size:22px; color:var(--green); border:3px solid var(--green);
    display:inline-block; padding:6px 14px; transform:rotate(-3deg); letter-spacing:2px;
  }
  .complete-banner .detail{font-size:12px; color:var(--ink-soft); margin-top:10px; line-height:1.5;}
  .new-proj-form{margin-top:14px;}
  .new-proj-form .row2{display:flex; gap:6px; margin-bottom:6px;}
  .new-proj-form label{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-soft); display:block; margin-bottom:3px;}
  .new-proj-form input{width:100%;}
  .field{flex:1;}

  .tabs{display:flex; gap:0; margin:18px 0 12px; border-bottom:1px solid var(--line);}
  .tab-btn{
    font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:1px;
    background:none; border:none; padding:8px 4px; margin-right:16px; color:var(--ink-soft); cursor:pointer;
    border-bottom:2px solid transparent;

  .tab-btn.active{color:var(--ink); border-bottom-color:var(--blue); font-weight:700;}

  .archive-item{border:1px solid var(--line); padding:10px 12px; margin-bottom:8px; background:rgba(255,255,255,0.4); cursor:pointer;}
  .archive-item .ai-head{display:flex; justify-content:space-between; font-size:12px; font-weight:700;}
  .archive-item .ai-sub{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .archive-empty{font-size:12px; color:var(--ink-faint); text-align:center; padding:16px 0;}

  .backup-row{display:flex; justify-content:center; gap:18px; padding-top:6px; border-top:1px dotted var(--line);}
  .footer-row{display:flex; justify-content:space-between; align-items:center; padding:14px 0 20px; margin-top:6px;}
  #saveStatus{font-size:10px; color:var(--ink-faint); opacity:0; transition:opacity .3s;}
  #saveStatus.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <div class="receipt">
    <div class="tear top"></div>
    <div id="app"></div>
    <div class="tear bottom"></div>
  </div>
</div>
<input type="file" id="importFile" accept="application/json" style="display:none;">

<script>
// ---------- state ----------
let state = null;
let uiTab = 'current';
let expandedArchive = new Set();
let resetArmed = false;
let resetTimer = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtEuro(n){ return n.toFixed(2).replace('.', ',') + ' \u20ac'; }
function fmtDateFull(d){ const [y,m,day] = d.split('-'); return day+'.'+m+'.'+y; }
function fmtDateShort(d){ const [y,m,day] = d.split('-'); return day+'.'+m; }
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function seedState(){
  const proj = {
    id: uid(), name:'\u0411\u0438\u0442\u043a\u043e\u0438\u043d', symbol:'BTC', target:1000, price:0.25,
    startedAt:'2026-07-17', completedAt:null,
    log:[ {id:uid(), type:'entry', ts:'2026-07-17', amount:17, note:'\u041f\u0435\u0440\u0432\u044b\u0439 \u0434\u0435\u043d\u044c'} ]
  };
  return { projects:[proj], activeProjectId: proj.id };
}

const STORAGE_KEY = 'bottles_tracker_state_v1';

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state = JSON.parse(raw); }
    else { state = seedState(); saveState(false); }
  }catch(e){
    state = seedState();
    try{ saveState(false); }catch(e2){}
  }
  render();
}

function saveState(showStatus){
  const el = document.getElementById('saveStatus');
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if(showStatus !== false && el){ el.textContent = '\u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u043e \u2713'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1500); }
  }catch(e){
    if(el){ el.textContent = '\u043e\u0448\u0438\u0431\u043a\u0430 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u044f'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }
  }
}

// ---------- backup / restore ----------
function exportBackup(){
  try{
    const data = localStorage.getItem(STORAGE_KEY) || JSON.stringify(state);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
    a.href = url;
    a.download = 'bottles-backup-'+stamp+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }catch(e){
    alert('\u041d\u0435 \u043f\u043e\u043b\u0443\u0447\u0438\u043b\u043e\u0441\u044c \u0441\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c \u0444\u0430\u0439\u043b. \u041f\u043e\u043f\u0440\u043e\u0431\u0443\u0439\u0442\u0435 \u0435\u0449\u0451 \u0440\u0430\u0437.');
  }
}

function importBackupFromFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || !Array.isArray(parsed.projects)) throw new Error('bad shape');
      state = parsed;
      saveState(false);
      render();
      const el = document.getElementById('saveStatus');
      if(el){ el.textContent = '\u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u043e \u2713'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000); }
    }catch(err){
      alert('\u042d\u0442\u043e \u0444\u0430\u0439\u043b \u043d\u0435 \u043f\u043e\u0445\u043e\u0436 \u043d\u0430 \u0440\u0435\u0437\u0435\u0440\u0432\u043d\u0443\u044e \u043a\u043e\u043f\u0438\u044e \u0442\u0440\u0435\u043a\u0435\u0440\u0430.');
    }
  };
  reader.readAsText(file);
}

function getActive(){
  return state.projects.find(p => p.id === state.activeProjectId) || state.projects[state.projects.length-1];
}
function totalBottles(proj){
  return proj.log.filter(e=>e.type==='entry').reduce((s,e)=>s+e.amount,0);
}

// ---------- mutations ----------
function addBottles(amount){
  const proj = getActive();
  if(!proj || proj.completedAt || !amount || amount<=0) return;
  const before = totalBottles(proj);
  const after = before + amount;
  proj.log.push({id:uid(), type:'entry', ts: todayStr(), amount: amount});
  let nextMultiple = (Math.floor(before/100)+1)*100;
  while(nextMultiple <= after && nextMultiple <= proj.target){
    proj.log.push({id:uid(), type:'checkpoint', ts: todayStr(), count: nextMultiple, redeemed:false});
    nextMultiple += 100;
  }
  if(after >= proj.target && !proj.completedAt){ proj.completedAt = todayStr(); }
  saveState(); render();
}

function undoLast(){
  const proj = getActive();
  if(!proj) return;
  let idx=-1;
  for(let i=proj.log.length-1;i>=0;i--){ if(proj.log[i].type==='entry'){ idx=i; break; } }
  if(idx===-1) return;
  proj.log.splice(idx);
  if(proj.completedAt && totalBottles(proj) < proj.target) proj.completedAt = null;
  saveState(); render();
}

function toggleRedeem(id){
  for(const p of state.projects){
    const ev = p.log.find(e=>e.id===id && e.type==='checkpoint');
    if(ev){ ev.redeemed = !ev.redeemed; break; }
  }
  saveState(); render();
}

function startNewProject(name, symbol, target, price){
  const p = {
    id: uid(), name: name || '\u0411\u0435\u0437 \u043d\u0430\u0437\u0432\u0430\u043d\u0438\u044f',
    symbol: (symbol||'').toUpperCase(), target: target>0?target:1000, price: price>0?price:0.25,
    startedAt: todayStr(), completedAt:null, log:[]
  };
  state.projects.push(p);
  state.activeProjectId = p.id;
  saveState(); render();
}

function doReset(){
  state = seedState();
  state.projects[0].log = [];
  state.projects[0].startedAt = todayStr();
  uiTab = 'current';
  saveState(); render();
}

// ---------- render ----------
function renderLogRow(ev, proj){
  if(ev.type==='entry'){
    return '<div class="log-row">'
      + '<span class="log-date">'+fmtDateShort(ev.ts)+'</span>'
      + '<span class="log-desc">PFAND \u00d7 '+ev.amount+'</span>'
      + '<span class="log-amt">+'+fmtEuro(ev.amount*proj.price)+'</span>'
      + '</div>';
  }
  return '<div class="log-row log-stamp '+(ev.redeemed?'is-redeemed':'')+'" data-action="toggle-redeem" data-id="'+ev.id+'">'
    + '<span class="stamp-icon">'+(ev.redeemed?'\u2713':'\u25cb')+'</span>'
    + '<span class="log-desc">\u0427\u0415\u041a \u2014 '+ev.count+' \u0448\u0442'+(ev.redeemed?' (\u0441\u0434\u0430\u043d\u043e)':' (\u043d\u0430\u0436\u043c\u0438, \u043a\u0430\u043a \u0441\u0434\u0430\u0448\u044c)')+'</span>'
    + '<span class="log-amt">'+fmtEuro(100*proj.price)+'</span>'
    + '</div>';
}

function renderCurrent(){
  const proj = getActive();
  const total = totalBottles(proj);
  const pct = Math.min(100, (total/proj.target)*100);
  const remainingToTarget = Math.max(0, proj.target-total);

  let nextCk = proj.target;
  if(total < proj.target){
    nextCk = (Math.floor(total/100)+1)*100;
    if(nextCk > proj.target) nextCk = proj.target;
  }
  const ckStart = Math.max(0, nextCk-100);
  const ckSpan = Math.max(1, nextCk-ckStart);
  const ckProgress = Math.min(ckSpan, total-ckStart);
  const ckPct = Math.min(100, (ckProgress/ckSpan)*100);
  const remainingToNext = Math.max(0, nextCk-total);
  const ckIndex = Math.floor(nextCk/100);

  const moneySoFar = total*proj.price;
  const redeemedCk = proj.log.filter(e=>e.type==='checkpoint' && e.redeemed);
  const redeemedMoney = redeemedCk.length*100*proj.price;

  let html = '';
  html += '<div class="masthead">'
    + '<div class="stamp-title">PFAND-\u041a\u0410\u0421\u0421\u041e\u0412\u042b\u0419 \u0427\u0415\u041a</div>'
    + '<div class="sub">\u041f\u0440\u043e\u0435\u043a\u0442: <span class="proj-name">'+esc(proj.name)+(proj.symbol?' \u00b7 '+esc(proj.symbol):'')+'</span> &nbsp;\u00b7&nbsp; \u043d\u0430\u0447\u0430\u0442 '+fmtDateFull(proj.startedAt)+'</div>'
    + '</div>';
  html += '<hr class="dotted">';

  html += '<div class="hero"><div class="num">'+total+' <small>/ '+proj.target+'</small></div>'
    + '<div class="cap">\u0431\u0443\u0442\u044b\u043b\u043e\u043a \u0441\u043e\u0431\u0440\u0430\u043d\u043e</div></div>';
  html += '<div class="bar-track"><div class="bar-base"></div><div class="bar-fill" style="width:'+pct.toFixed(1)+'%"></div></div>';
  html += '<div class="bar-note"><span>'+pct.toFixed(1)+'%</span><span>'+(remainingToTarget>0?'\u043e\u0441\u0442\u0430\u043b\u043e\u0441\u044c '+remainingToTarget+' \u0448\u0442':'\u0446\u0435\u043b\u044c \u0434\u043e\u0441\u0442\u0438\u0433\u043d\u0443\u0442\u0430')+'</span></div>';

  if(total < proj.target){
    html += '<div class="block-title" style="margin-top:16px;">\u0447\u0435\u043a #'+ckIndex+' <b>'+ckProgress+' / '+ckSpan+'</b></div>';
    html += '<div class="bar-track"><div class="bar-base"></div><div class="bar-fill" style="width:'+ckPct.toFixed(1)+'%"></div></div>';
    html += '<div class="bar-note"><span>\u0435\u0449\u0451 '+remainingToNext+' \u0448\u0442</span><span>\u2192 '+fmtEuro(ckSpan*proj.price)+'</span></div>';
  }

  html += '<div class="stats-grid">'
    + '<div class="stat"><div class="lbl">\u0421\u043e\u0431\u0440\u0430\u043d\u043e \u043d\u0430 \u0441\u0443\u043c\u043c\u0443</div><div class="val blue">'+fmtEuro(moneySoFar)+'</div></div>'
    + '<div class="stat"><div class="lbl">\u041e\u0441\u0442\u0430\u043b\u043e\u0441\u044c \u0448\u0442</div><div class="val">'+remainingToTarget+'</div></div>'
    + '<div class="stat"><div class="lbl">\u0427\u0435\u043a\u043e\u0432 \u0441\u0434\u0430\u043d\u043e</div><div class="val green">'+redeemedCk.length+' / '+Math.ceil(proj.target/100)+'</div></div>'
    + '<div class="stat"><div class="lbl">\u041f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u043e, \u20ac</div><div class="val green">'+fmtEuro(redeemedMoney)+'</div></div>'
    + '</div>';

  html += '<hr class="dotted">';

  if(proj.completedAt){
    html += '<div class="complete-banner">'
      + '<div class="stamp">\u041f\u0420\u041e\u0415\u041a\u0422 \u0417\u0410\u0412\u0415\u0420\u0428\u0401\u041d</div>'
      + '<div class="detail">'+proj.target+' \u0431\u0443\u0442\u044b\u043b\u043e\u043a \u2192 '+fmtEuro(proj.target*proj.price)+' \u2192 '+esc(proj.symbol||proj.name)+'<br>\u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d '+fmtDateFull(proj.completedAt)+'</div>'
      + '<div class="new-proj-form">'
      + '<div class="section-label" style="text-align:left;">\u041d\u0430\u0447\u0430\u0442\u044c \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u043f\u0440\u043e\u0435\u043a\u0442</div>'
      + '<div class="row2">'
      + '<div class="field"><label>\u041d\u0430\u0437\u0432\u0430\u043d\u0438\u0435</label><input type="text" id="npName" placeholder="\u041d\u0430\u043f\u0440\u0438\u043c\u0435\u0440, \u042d\u0444\u0438\u0440\u0438\u0443\u043c"></div>'
      + '<div class="field"><label>\u0422\u0438\u043a\u0435\u0440</label><input type="text" id="npSymbol" placeholder="ETH"></div>'
      + '</div>'
      + '<div class="row2">'
      + '<div class="field"><label>\u0426\u0435\u043b\u044c, \u0448\u0442</label><input type="number" id="npTarget" value="1000" min="1"></div>'
      + '<div class="field"><label>\u0426\u0435\u043d\u0430/\u0431\u0443\u0442., \u20ac</label><input type="number" id="npPrice" value="0.25" step="0.01" min="0.01"></div>'
      + '</div>'
      + '<button class="btn-primary" data-action="start-new">\u041d\u0430\u0447\u0430\u0442\u044c \u043d\u043e\u0432\u044b\u0439 \u043f\u0440\u043e\u0435\u043a\u0442</button>'
      + '</div></div>';
  } else {
    html += '<div class="section-label">\u0434\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0431\u0443\u0442\u044b\u043b\u043a\u0438</div>';
    html += '<div class="quick-row">'
      + '<button class="btn-quick" data-action="add-quick" data-amount="1">+1</button>'
      + '<button class="btn-quick" data-action="add-quick" data-amount="5">+5</button>'
      + '<button class="btn-quick" data-action="add-quick" data-amount="10">+10</button>'
      + '<button class="btn-quick" data-action="add-quick" data-amount="20">+20</button>'
      + '</div>';
    html += '<div class="custom-row" style="margin-bottom:8px;">'
      + '<input type="number" id="amountInput" placeholder="\u0441\u0432\u043e\u0451 \u0447\u0438\u0441\u043b\u043e" min="1" style="width:100%;">'
      + '</div>';
    html += '<button class="btn-primary" data-action="add-custom">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c</button>';
  }

  html += '<hr class="dotted">';
  html += '<div class="section-label">\u0438\u0441\u0442\u043e\u0440\u0438\u044f</div>';
  if(proj.log.length===0){
    html += '<div class="log-empty">\u043f\u043e\u043a\u0430 \u043f\u0443\u0441\u0442\u043e \u2014 \u0434\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u043f\u0435\u0440\u0432\u044b\u0435 \u0431\u0443\u0442\u044b\u043b\u043a\u0438</div>';
  } else {
    html += '<div class="log-list">'+[...proj.log].reverse().map(ev=>renderLogRow(ev,proj)).join('')+'</div>';
  }
  if(!proj.completedAt){
    html += '<button class="btn-ghost" data-action="undo">\u043e\u0442\u043c\u0435\u043d\u0438\u0442\u044c \u043f\u043e\u0441\u043b\u0435\u0434\u043d\u044e\u044e \u0437\u0430\u043f\u0438\u0441\u044c</button>';
  }

  return html;
}

function renderArchive(){
  const others = state.projects.filter(p=>p.id!==state.activeProjectId);
  if(others.length===0){
    return '<div class="archive-empty">\u0434\u0440\u0443\u0433\u0438\u0445 \u043f\u0440\u043e\u0435\u043a\u0442\u043e\u0432 \u043f\u043e\u043a\u0430 \u043d\u0435\u0442</div>';
  }
  let html = '';
  others.forEach(p=>{
    const t = totalBottles(p);
    const isOpen = expandedArchive.has(p.id);
    html += '<div class="archive-item" data-action="toggle-archive" data-id="'+p.id+'">'
      + '<div class="ai-head"><span>'+esc(p.name)+(p.symbol?' \u00b7 '+esc(p.symbol):'')+'</span><span>'+t+' / '+p.target+'</span></div>'
      + '<div class="ai-sub">'+(p.completedAt? '\u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d '+fmtDateFull(p.completedAt) : '\u043d\u0435 \u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d')+' \u00b7 '+fmtEuro(t*p.price)+'</div>';
    if(isOpen){
      html += '<div style="margin-top:8px;">'+(p.log.length? [...p.log].reverse().map(ev=>renderLogRow(ev,p)).join('') : '<div class="log-empty">\u043f\u0443\u0441\u0442\u043e</div>')+'</div>';
    }
    html += '</div>';
  });
  return html;
}

function render(){
  const app = document.getElementById('app');
  let html = '';
  html += (uiTab==='current') ? renderCurrent() : '';
  html += '<div class="tabs">'
    + '<button class="tab-btn '+(uiTab==='current'?'active':'')+'" data-action="tab" data-tab="current">\u0422\u0435\u043a\u0443\u0449\u0438\u0439</button>'
    + '<button class="tab-btn '+(uiTab==='archive'?'active':'')+'" data-action="tab" data-tab="archive">\u0410\u0440\u0445\u0438\u0432 ('+(state.projects.length-1)+')</button>'
    + '</div>';
  if(uiTab==='archive'){ html += renderArchive(); }

  html += '<div class="backup-row">'
    + '<button class="btn-ghost" data-action="export">\u0441\u043a\u0430\u0447\u0430\u0442\u044c \u043a\u043e\u043f\u0438\u044e \u0434\u0430\u043d\u043d\u044b\u0445</button>'
    + '<button class="btn-ghost" data-action="import">\u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u0438\u0437 \u043a\u043e\u043f\u0438\u0438</button>'
    + '</div>';

  html += '<div class="footer-row">'
    + '<button class="btn-ghost" id="resetBtn" data-action="reset">'+(resetArmed? '\u0442\u043e\u0447\u043d\u043e \u0443\u0434\u0430\u043b\u0438\u0442\u044c \u0432\u0441\u0451? \u043d\u0430\u0436\u043c\u0438\u0442\u0435 \u0435\u0449\u0451 \u0440\u0430\u0437':'\u0441\u0431\u0440\u043e\u0441\u0438\u0442\u044c \u0434\u0430\u043d\u043d\u044b\u0435')+'</button>'
    + '<span id="saveStatus"></span>'
    + '</div>';

  app.innerHTML = html;
}

// ---------- events (delegated, attached once) ----------
document.getElementById('app').addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action==='add-quick'){
    addBottles(parseInt(el.dataset.amount,10));
    return;
  }
  if(action==='add-custom'){
    const amountInput = document.getElementById('amountInput');
    const amount = amountInput ? parseInt(amountInput.value,10) : 0;
    if(amount>0) addBottles(amount);
    return;
  }
  if(action==='undo'){ undoLast(); return; }
  if(action==='toggle-redeem'){ toggleRedeem(el.dataset.id); return; }
  if(action==='start-new'){
    const name = document.getElementById('npName').value.trim();
    const symbol = document.getElementById('npSymbol').value.trim();
    const target = parseInt(document.getElementById('npTarget').value,10);
    const price = parseFloat(document.getElementById('npPrice').value);
    startNewProject(name, symbol, target, price);
    return;
  }
  if(action==='tab'){ uiTab = el.dataset.tab; render(); return; }
  if(action==='toggle-archive'){
    const id = el.dataset.id;
    if(expandedArchive.has(id)) expandedArchive.delete(id); else expandedArchive.add(id);
    render();
    return;
  }
  if(action==='export'){ exportBackup(); return; }
  if(action==='import'){ document.getElementById('importFile').click(); return; }
  if(action==='reset'){
    if(!resetArmed){
      resetArmed = true;
      render();
      resetTimer = setTimeout(()=>{ resetArmed=false; render(); }, 5000);
    } else {
      clearTimeout(resetTimer);
      resetArmed = false;
      doReset();
    }
    return;
  }
});

document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  if(file) importBackupFromFile(file);
  e.target.value = '';
});

loadState();
</script>
</body>
</html>
